;; PgBouncer configuration for MSP Compliance Platform
;;
;; Sits between FastAPI app and PostgreSQL to:
;; 1. Consolidate connection pools (SQLAlchemy + asyncpg → single pool)
;; 2. Enable connection multiplexing (100 app conns → 25 PG conns)
;; 3. Support SET LOCAL for RLS tenant isolation (transaction pooling mode)
;;
;; Deploy: Add as Docker service or install on VPS alongside mcp-postgres
;; App connects to PgBouncer (port 6432), PgBouncer connects to PostgreSQL (port 5432)

[databases]
;; Forward all connections to the local PostgreSQL container
;; Replace host with actual postgres hostname in docker network
mcp = host=mcp-postgres port=5432 dbname=mcp

[pgbouncer]
;; Listen for connections from the app
listen_addr = 0.0.0.0
listen_port = 6432

;; Authentication
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

;; CRITICAL: Transaction pooling mode
;; - Multiplexes connections between transactions (not sessions)
;; - SET LOCAL works correctly (scoped to transaction, cleared on release)
;; - SET (session-level) would leak to next user — do NOT use SET without LOCAL
pool_mode = transaction
ignore_startup_parameters = extra_float_digits,statement_timeout

;; Pool sizing
;; App side: up to 400 client connections (SQLAlchemy 20+30 + asyncpg 5-50 + burst).
;; DB side: 50 actual PostgreSQL connections — bumped from 25 in the
;; 2026-05-09 multi-tenant Phase 0 audit (P1-4) which projected
;; saturation at N=10 customers (~30 sites checking in concurrently
;; every ~30s). 25-conn default sat the cl_waiting>0 threshold during
;; checkin storms; doubling restores headroom while keeping DB
;; connection memory <100MB above current.
;; Sibling pattern: postgres max_connections (default 100) covers
;; pgbouncer 50 + 5 admin + ~5 ops headroom — within budget.
max_client_conn = 400
default_pool_size = 50
min_pool_size = 10
reserve_pool_size = 10
reserve_pool_timeout = 3

;; Connection lifecycle
;; server_reset_query runs between transactions — defense-in-depth cleanup
;; DISCARD ALL resets all session state including SET LOCAL remnants
server_reset_query = DISCARD ALL
server_check_delay = 30
server_check_query = SELECT 1
server_lifetime = 3600
server_idle_timeout = 600
client_idle_timeout = 0

;; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

;; Admin console (for monitoring)
admin_users = mcp
stats_users = mcp

;; PgBouncer 1.21+ supports prepared statements in transaction-pool mode: with a
;; non-zero cap, pgbouncer tracks prepared stmts per-client and routes collisions
;; to a fresh backend instead of blowing up. Required once mcp-server runs past
;; warmup — SQLAlchemy's asyncpg dialect calls prepare() on every query even with
;; statement_cache_size=0, so the deterministic __asyncpg_stmt_N__ names collide
;; across multiplexed backends. Session 208 incident: mcp-server restart loop for
;; 40 min after migration 231 lifespan gate, root-caused to max_prepared_statements=0.
max_prepared_statements = 200
