groups:
  - name: osiriscare_security_invariants
    interval: 60s
    rules:
      - alert: PrivilegedChainTriggersNotInstalled
        expr: osiriscare_privileged_chain_triggers_installed != 2
        for: 5m
        labels:
          severity: critical
          category: security_chain_integrity
        annotations:
          summary: "Privileged-access chain enforcement triggers missing"
          description: |
            osiriscare_privileged_chain_triggers_installed = {{ $value }} (expected 2).
            Migration 175 + 176 must both be applied. Without them, a
            privileged fleet order can be INSERTed without an attestation
            bundle — chain-of-custody break.
          runbook: https://docs.osiriscare.net/security/alert-runbooks#startup_invariant_broken

      - alert: ChainTamperDetected
        expr: increase(osiriscare_chain_tamper_events_total[1h]) > 0
        for: 0m
        labels:
          severity: critical
          category: security_chain_integrity
          pager: on-call
        annotations:
          summary: "Evidence-chain tampering detected on at least one site"
          description: |
            The hourly chain_tamper_detector loop found a broken bundle.
            This SHOULD be impossible (migrations 151/161 block DELETE;
            migration 179 blocks TRUNCATE). If this alert fires,
            investigate immediately — see alert-runbooks.md
            CHAIN_TAMPER_DETECTED entry.

      - alert: StartupInvariantsDegraded
        expr: min(osiriscare_startup_invariant_ok) == 0
        for: 2m
        labels:
          severity: critical
          category: security_chain_integrity
        annotations:
          summary: "One or more DB-layer security invariants broken at startup"
          description: |
            Startup invariant check found {{ $labels.name }} = 0.
            The server is running but DB-layer protection is partial.
            See admin_audit_log.action = STARTUP_INVARIANT_BROKEN.

  - name: osiriscare_privileged_access
    interval: 60s
    rules:
      - alert: PrivilegedNotifierQueueDepthHigh
        expr: osiriscare_privileged_notifier_queue_depth > 5
        for: 10m
        labels:
          severity: warning
          category: operations
        annotations:
          summary: "Privileged-access notifier queue is backlogged"
          description: |
            {{ $value }} privileged_access bundles unnotified for >10min.
            Check SMTP connectivity + notifier loop heartbeat. Pending
            approval requests may time out.

      - alert: PrivilegedAccessEventsSpike
        expr: increase(osiriscare_privileged_access_events_7d[1d]) > 10
        for: 5m
        labels:
          severity: warning
          category: security_access_governance
        annotations:
          summary: "Unusual spike in privileged-access events"
          description: |
            More than 10 privileged-access events in a single day across
            the fleet. This may be legitimate (mass maintenance window)
            OR the symptom of a compromised partner credential being
            used to issue emergency-access orders at scale. Investigate.

      - alert: MagicLinkMintFailureRatio
        expr: |
          rate(osiriscare_magic_link_mint_failed_total[15m]) /
          (rate(osiriscare_magic_link_mint_total[15m]) + 0.0001) > 0.1
        for: 10m
        labels:
          severity: warning
          category: operations
        annotations:
          summary: "Magic-link mint failure rate >10%"
          description: |
            Approval emails are being dispatched but ≥10% of mint
            attempts are failing. Clients cannot approve via email.
            Check HMAC key, DB, and notifier loop health.

  - name: osiriscare_background_loops
    interval: 60s
    rules:
      - alert: BackgroundLoopStale
        # Age (in seconds since last iteration) > 3x declared expected
        # interval per loop. Uses the declarative per-loop metric
        # exported by prometheus_metrics.py so the threshold is driven
        # from code (bg_heartbeat.EXPECTED_INTERVAL_S), not duplicated
        # in the alert-rules file.
        expr: |
          osiriscare_bg_loop_last_heartbeat_seconds
            > on(loop_name) 3 * osiriscare_bg_loop_expected_interval_seconds
        for: 5m
        labels:
          severity: warning
          category: operations
        annotations:
          summary: "Background loop {{ $labels.loop_name }} heartbeat stale"
          description: |
            Loop {{ $labels.loop_name }} last recorded a heartbeat
            {{ $value | humanizeDuration }} ago, exceeding 3x its
            declared interval. Not crashed (different alert) — stuck.
            See /api/admin/health/loops for triage. Runbook:
            docs/security/alert-runbooks.md → Loop heartbeat stale.

      - alert: BackgroundLoopErrorRateHigh
        # Healthy loops have errors_total near-flat. A sustained rate
        # > 10% of iterations indicates an upstream problem the loop
        # is silently absorbing.
        expr: |
          rate(osiriscare_bg_loop_errors_total[15m])
            / (rate(osiriscare_bg_loop_iterations_total[15m]) + 0.0001)
            > 0.1
        for: 30m
        labels:
          severity: warning
          category: operations
        annotations:
          summary: "Loop {{ $labels.loop_name }} error rate > 10% for 30m"
          description: |
            Iterations are running but ≥10% are failing. Check logs for
            bg_task_crashed entries or the loop's own structured log
            output.

  - name: osiriscare_evidence_chain
    interval: 60s
    rules:
      - alert: OTSAnchoringLag
        expr: osiriscare_ots_unanchored_bundles_older_than_24h > 0
        for: 30m
        labels:
          severity: warning
          category: evidence_integrity
        annotations:
          summary: "Evidence bundles not anchored within 24h SLO"
          description: |
            {{ $value }} bundles are older than 24h but not OTS-anchored.
            Tier-1 SLO target: 99% of bundles anchored within 24h.
            Check merkle_batch loop + OpenTimestamps calendar reachability.

      - alert: ApplianceServerPubkeyDivergence
        expr: osiriscare_appliance_server_pubkey_divergence > 0
        for: 15m
        labels:
          severity: warning
          category: security_key_rotation
        annotations:
          summary: "Appliance fleet has diverged server-pubkey state"
          description: |
            {{ $value }} appliances are on a different server_pubkey
            than the majority. Mid-rotation is expected for short
            windows; sustained divergence means some appliances are
            decommissioned or unable to rotate. Follow key-rotation
            runbook step "Wait for ACKs".

  # ───────────────────────────────────────────────────────────────────
  # Migration 184 Phase 4 — consent request delivery health
  # ───────────────────────────────────────────────────────────────────
  - name: osiriscare_consent_delivery
    interval: 300s
    rules:
      - alert: ConsentRequestExpirySpike
        expr: osiriscare_consent_token_expired_7d > 10
        for: 1h
        labels:
          severity: warning
          category: consent_delivery
        annotations:
          summary: "More than 10 consent-request tokens expired unconsumed in 7d"
          description: |
            {{ $value }} magic-link consent tokens expired without being
            approved in the last 7 days. This usually means the email
            delivery path is broken OR partners are requesting consent
            the client isn't expecting (education/UX issue).

            Diagnose:
              1. Check SMTP health (send a test via /api/admin/health)
              2. Review recent consent_request_tokens rows by partner
                 to spot a single spammy partner
              3. Check DNS / SPF / DKIM for the sending domain

            Runbook: docs/phase-4-consent-ui-brief.md §"Pitfalls"

      - alert: ConsentRequestQueueStuck
        expr: osiriscare_consent_token_pending > 50
        for: 2h
        labels:
          severity: warning
          category: consent_delivery
        annotations:
          summary: "Consent request queue larger than 50 for > 2h"
          description: |
            {{ $value }} consent requests are currently awaiting
            customer approval. If this grows unbounded, something is
            wrong with the email path — customers can't click the
            link if they never received it.

            Thresholds calibrated for <10 active partners; revisit
            when partner count > 20.

  # ───────────────────────────────────────────────────────────────────
  # Substrate Integrity Engine — Session 209
  #
  # `osiriscare_substrate_violations_active` is emitted by
  # prometheus_metrics.py from the `v_substrate_violations_active` view.
  # One sample per open violation, labeled by (invariant_name, severity,
  # site_id). A fleet-clean state emits a single zero-value sample
  # carrying `invariant_name="_none"` so these rules can distinguish
  # "clean" from "no data" explicitly.
  #
  # Severity / `for:` calibration:
  #   sev1 → pager, for:5m  (the engine already has its own 15-min
  #                          detection window; don't double it)
  #   sev2 → warn,  for:15m
  #   sev3 → info,  for:2h
  # ───────────────────────────────────────────────────────────────────
  - name: osiriscare_substrate_invariants
    interval: 60s
    rules:
      - alert: SubstrateInvariantSev1
        expr: |
          sum by (invariant_name, site_id) (
            osiriscare_substrate_violations_active{severity="sev1",invariant_name!="_none"}
          ) > 0
        for: 5m
        labels:
          severity: critical
          category: substrate_integrity
          pager: on-call
        annotations:
          summary: "Substrate sev1 invariant {{ $labels.invariant_name }} failing"
          description: |
            Substrate invariant `{{ $labels.invariant_name }}` is in a
            failing state{{ if $labels.site_id }} for site {{ $labels.site_id }}{{ end }}.
            This is a sev1 — platform-level integrity breach.
            Check /admin/substrate-health for detail + recommended action.
          runbook_url: "https://www.osiriscare.net/admin/substrate-health"

      - alert: SubstrateInvariantSev2
        expr: |
          sum by (invariant_name, site_id) (
            osiriscare_substrate_violations_active{severity="sev2",invariant_name!="_none"}
          ) > 0
        for: 15m
        labels:
          severity: warning
          category: substrate_integrity
        annotations:
          summary: "Substrate sev2 invariant {{ $labels.invariant_name }} failing"
          description: |
            Substrate invariant `{{ $labels.invariant_name }}` has been
            failing for ≥15 min{{ if $labels.site_id }} on site {{ $labels.site_id }}{{ end }}.
            Triage via /admin/substrate-health.
          runbook_url: "https://www.osiriscare.net/admin/substrate-health"

      - alert: SubstrateInvariantSev3
        expr: |
          sum by (invariant_name, site_id) (
            osiriscare_substrate_violations_active{severity="sev3",invariant_name!="_none"}
          ) > 0
        for: 2h
        labels:
          severity: info
          category: substrate_integrity
        annotations:
          summary: "Substrate sev3 invariant {{ $labels.invariant_name }} open >2h"
          description: |
            Long-lived low-severity substrate signal on
            `{{ $labels.invariant_name }}`{{ if $labels.site_id }} (site {{ $labels.site_id }}){{ end }}.
            Review during next ops window.
          runbook_url: "https://www.osiriscare.net/admin/substrate-health"

      # Named sev1 alerts — these are the three invariants Session 209
      # added/verified and that we most want paged individually so the
      # operator sees the failure mode in the alert title, not only
      # "some sev1 broke".
      - alert: EvidenceChainStalled
        expr: |
          osiriscare_substrate_violations_active{invariant_name="evidence_chain_stalled"} > 0
        for: 5m
        labels:
          severity: critical
          category: substrate_integrity
          pager: on-call
        annotations:
          summary: "Evidence chain stalled — appliances checking in, no bundles landing"
          description: |
            At least one appliance has checked in within the last 15 min
            but zero `compliance_bundles` have been INSERTed in that
            window. Typical causes: RLS regression, missing partition,
            signing-key rotation gap, disk pressure on the evidence
            partition. HIPAA attestation is accruing a gap — treat as
            production incident.
          runbook_url: "https://www.osiriscare.net/admin/substrate-health#evidence_chain_stalled"

      - alert: FlywheelLedgerStalled
        expr: |
          osiriscare_substrate_violations_active{invariant_name="flywheel_ledger_stalled"} > 0
        for: 5m
        labels:
          severity: critical
          category: substrate_integrity
          pager: on-call
        annotations:
          summary: "Flywheel ledger stalled — rollouts completing but no events recorded"
          description: |
            Promoted rules in rolling_out state have fleet_order
            completions but zero `promoted_rule_events` writes in the
            last 60 min. Indicates a three-list drift or a silent
            CheckViolationError in safe_rollout_promoted_rule. The
            spine is failing silently; orchestrator decisions become
            undecidable.
          runbook_url: "https://www.osiriscare.net/admin/substrate-health#flywheel_ledger_stalled"

      - alert: ProvisioningStalled
        expr: |
          osiriscare_substrate_violations_active{invariant_name="provisioning_stalled"} > 0
        for: 5m
        labels:
          severity: critical
          category: substrate_integrity
          pager: on-call
        annotations:
          summary: "Provisioning stalled — installer session looping, no site_appliance checkin"
          description: |
            A MAC has ≥3 `install_sessions` checkins in the last hour
            but `site_appliances.last_checkin` is NULL or >15 min
            stale. Typical root causes: DNS-filter blocking
            `api.osiriscare.net`, cert pin mismatch, NAT traversal.
            Customer-visible failure — block new installs behind this.
          runbook_url: "https://www.osiriscare.net/admin/substrate-health#provisioning_stalled"
