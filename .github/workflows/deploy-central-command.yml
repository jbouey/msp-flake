name: Deploy Central Command

on:
  push:
    branches: [main]
    paths:
      - 'mcp-server/central-command/**'
      - 'mcp-server/main.py'
  workflow_dispatch:  # Allow manual trigger

env:
  VPS_HOST: 178.156.162.116
  VPS_USER: root
  RELEASES_DIR: /opt/mcp-server/releases
  CURRENT_LINK: /opt/mcp-server/current

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend test dependencies
        working-directory: mcp-server/central-command/backend
        run: |
          pip install pytest==8.3.4 pytest-asyncio==0.24.0 httpx==0.27.0
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: mcp-server/central-command/backend
        run: |
          # Run each test file in its own subprocess to prevent stub contamination
          # (test files stub sys.modules which leaks across files in same process)
          failed=0
          for f in tests/test_*.py; do
            echo "::group::$f"
            python -m pytest "$f" -v --tb=short || failed=1
            echo "::endgroup::"
          done
          exit $failed

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp-server/central-command/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: mcp-server/central-command/frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: mcp-server/central-command/frontend
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: mcp-server/central-command/frontend
        run: npx eslint src/ --max-warnings 0

      - name: Vitest
        working-directory: mcp-server/central-command/frontend
        run: npx vitest run

  privileged-chain-pg-tests:
    # Phase 15 A-spec hygiene: end-to-end tests against real Postgres
    # for the Session 205 privileged-access security primitives:
    #   - chain enforcement triggers (migrations 175 + 176)
    #   - magic-link token mint/verify/consume cycle
    #   - separate MAGIC_LINK_HMAC_KEY_FILE defense-in-depth
    #
    # Why these exist: the Session 205 migration 175/176 %% RAISE bug
    # passed a syntax check (plpgsql function bodies are stored as
    # text), but failed at trigger-fire time with "too many parameters
    # specified for RAISE". A static migrations-up smoke test wouldn't
    # have caught it — only an INSERT/UPDATE test that fires the
    # trigger does. Magic-link tokens are similarly only safe if the
    # whole HMAC + expiry + single-use + session-binding chain is
    # actually exercised against a real DB.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mcp
          POSTGRES_PASSWORD: mcp
          POSTGRES_DB: mcp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mcp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend deps
        # Same pattern as the `test` job — backend conftest imports the
        # full package (models → pydantic → ...). Cheaper than
        # surgically pruning conftest just for these PG tests.
        working-directory: mcp-server/central-command/backend
        run: |
          pip install pytest==8.3.4 pytest-asyncio==0.24.0
          pip install -r requirements.txt

      - name: Privileged-chain trigger integration test
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_privileged_chain_triggers_pg.py -v --tb=short

      - name: Magic-link token integration test
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_privileged_magic_link_pg.py -v --tb=short

      - name: Chain-tamper detector integration test
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_chain_tamper_detector_pg.py -v --tb=short

      - name: Startup-invariants integration test
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_startup_invariants_pg.py -v --tb=short

      - name: Chain adversarial pen-test
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_privileged_chain_adversarial_pg.py -v --tb=short

  deploy:
    needs: [test, privileged-chain-pg-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp-server/central-command/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: mcp-server/central-command/frontend
        run: npm ci

      - name: Build frontend
        working-directory: mcp-server/central-command/frontend
        run: npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create release directory
        run: |
          RELEASE_ID=$(date -u +%Y%m%d_%H%M%S)_${GITHUB_SHA::8}
          echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_ENV
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "mkdir -p ${{ env.RELEASES_DIR }}/$RELEASE_ID/{dashboard_api,app,frontend_dist,frontend}"

      - name: Deploy backend to release
        run: |
          rsync -avz --delete \
            mcp-server/central-command/backend/ \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/dashboard_api/

      - name: Deploy main.py to release
        run: |
          rsync -avz \
            mcp-server/main.py \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/app/

      - name: Deploy frontend to release
        run: |
          rsync -avz --delete \
            mcp-server/central-command/frontend/dist/ \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/frontend_dist/

      - name: Deploy nginx config to release
        run: |
          rsync -avz \
            mcp-server/central-command/frontend/nginx.conf \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/frontend/nginx.conf

      - name: Deploy docker-compose.yml to release
        # Source-control the VPS compose file. Without this step, env changes
        # (e.g., MIGRATION_DATABASE_URL added Session 205) are tribal knowledge
        # and reappear as silent failures if the VPS is rebuilt or the file is
        # edited by hand. The compose file holds no hardcoded secrets — all
        # passwords are ${ENV:-default} references resolved from /opt/mcp-server/.env.
        run: |
          rsync -avz \
            mcp-server/docker-compose.yml \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/docker-compose.yml

      - name: Atomic switch — symlink to new release
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} << EOF
            # Save previous release for rollback reference
            PREV_RELEASE=\$(readlink -f ${{ env.CURRENT_LINK }} 2>/dev/null || echo "none")
            echo "Previous release: \$PREV_RELEASE"
            echo "New release: ${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}"

            # Copy release files to the live mount points (Docker volume mounts)
            rsync -a --delete ${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/dashboard_api/ /opt/mcp-server/dashboard_api_mount/
            rsync -a ${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/app/ /opt/mcp-server/app/
            rsync -a --delete ${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/frontend_dist/ /opt/mcp-server/frontend_dist/
            rsync -a ${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/frontend/nginx.conf /opt/mcp-server/frontend/nginx.conf

            # Sync docker-compose.yml — tracked in git so env changes
            # (like MIGRATION_DATABASE_URL) aren't tribal knowledge.
            # Diff first so we log any change before applying.
            if ! diff -q ${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/docker-compose.yml /opt/mcp-server/docker-compose.yml > /dev/null 2>&1; then
              echo "docker-compose.yml changed — diffing before sync:"
              diff /opt/mcp-server/docker-compose.yml ${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/docker-compose.yml || true
              cp /opt/mcp-server/docker-compose.yml /opt/mcp-server/docker-compose.yml.bak.\$(date +%s)
              rsync -a ${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/docker-compose.yml /opt/mcp-server/docker-compose.yml
              echo "docker-compose.yml updated; will trigger \`docker compose up -d\` below"
              export COMPOSE_CHANGED=1
            fi

            # Update symlink to new release (for rollback reference)
            ln -sfn ${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }} ${{ env.CURRENT_LINK }}

            # Fix permissions
            chmod -R 755 /opt/mcp-server/dashboard_api_mount/
            chmod 644 /opt/mcp-server/app/main.py
          EOF

      - name: Run database migrations
        # Fail-closed: silent migration drift caused the 2026-04-12 90-min
        # fleet-order outage. If migrations fail, this step exits non-zero
        # so the Rollback on failure job triggers. The startup hook in
        # main.py also applies migrations fail-closed on every boot —
        # this CI step is belt-and-suspenders.
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash -s <<'EOF'
            set -e
            docker exec mcp-server python3 /app/dashboard_api/migrate.py status
            docker exec mcp-server python3 /app/dashboard_api/migrate.py up
            # Parse the summary line "N applied, N pending" — avoid grepping
            # for the word "pending" alone (matches migration NAMES like
            # pending_alerts and the "0 pending" summary).
            PENDING_OUT=$(docker exec mcp-server python3 /app/dashboard_api/migrate.py status)
            PENDING_COUNT=$(echo "$PENDING_OUT" | grep -oE '[0-9]+ pending$' | awk '{print $1}' | head -1)
            if [ -z "$PENDING_COUNT" ]; then
              echo "Could not parse pending count from migrate.py status output"
              echo "$PENDING_OUT"
              exit 1
            fi
            if [ "$PENDING_COUNT" -ne 0 ]; then
              echo "FATAL: $PENDING_COUNT migration(s) still pending after apply"
              echo "$PENDING_OUT"
              exit 1
            fi
          EOF

      - name: Restart services
        # `docker compose up -d` instead of `restart` — picks up any env
        # changes from the compose file we just rsynced. `restart` alone
        # keeps the old env so e.g. MIGRATION_DATABASE_URL additions won't
        # take effect without this pattern.
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} << 'EOF'
            cd /opt/mcp-server
            docker compose up -d pgbouncer
            sleep 3
            docker compose up -d mcp-server frontend
          EOF

      - name: Verify deployment
        run: |
          sleep 15
          HEALTH=$(ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "curl -sf http://localhost:8000/health")
          echo "$HEALTH"
          echo "$HEALTH" | grep -q '"status":"ok"' || exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} << 'EOF'
            echo "DEPLOY FAILED — attempting rollback..."
            CURRENT=$(readlink -f /opt/mcp-server/current 2>/dev/null)
            # Find the previous release (second newest)
            PREV=$(ls -dt /opt/mcp-server/releases/*/ 2>/dev/null | sed -n '2p' | sed 's:/$::')
            if [ -n "$PREV" ] && [ -d "$PREV" ]; then
              echo "Rolling back to: $PREV"
              rsync -a --delete "$PREV/dashboard_api/" /opt/mcp-server/dashboard_api_mount/
              rsync -a "$PREV/app/" /opt/mcp-server/app/
              rsync -a --delete "$PREV/frontend_dist/" /opt/mcp-server/frontend_dist/
              rsync -a "$PREV/frontend/nginx.conf" /opt/mcp-server/frontend/nginx.conf
              ln -sfn "$PREV" /opt/mcp-server/current
              chmod -R 755 /opt/mcp-server/dashboard_api_mount/
              cd /opt/mcp-server && docker compose restart pgbouncer && sleep 3 && docker compose restart mcp-server frontend
              sleep 10
              curl -sf http://localhost:8000/health && echo "ROLLBACK SUCCESSFUL" || echo "ROLLBACK FAILED — manual intervention required"
            else
              echo "NO PREVIOUS RELEASE FOUND — manual intervention required"
            fi
          EOF

      - name: Cleanup old releases (keep last 5)
        if: success()
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "ls -dt ${{ env.RELEASES_DIR }}/*/ | tail -n +6 | xargs rm -rf 2>/dev/null; echo 'Kept last 5 releases:'; ls -dt ${{ env.RELEASES_DIR }}/*/ | head -5"
