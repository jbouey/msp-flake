name: Deploy Central Command

on:
  push:
    branches: [main]
    paths:
      - 'mcp-server/central-command/**'
      - 'mcp-server/main.py'
      # Infra: docker-compose.yml is tracked in git (CLAUDE.md rule
      # from eff9097) and the deploy step rsyncs it to the VPS — but
      # a compose-only change (e.g. 60a27b8 adding an env-var binding)
      # was silently dropped because this paths filter didn't include
      # it. Include the compose file so any env / service change
      # triggers the full deploy-restart-verify cycle.
      - 'mcp-server/docker-compose.yml'
      # Include the workflow itself so YAML-only changes trigger a real
      # run (validates the new workflow AND refreshes GH's cached name,
      # avoiding the 0-job "ghost failure" behavior seen on 3cf4490).
      - '.github/workflows/deploy-central-command.yml'
  workflow_dispatch:  # Allow manual trigger

# Serialize deploys. Session 206 hit a cascade of 5 deploy failures
# where concurrent runs' SHA-verify steps read the /api/version SHA
# from a LATER deploy than their own expected, tripping the
# disk-SHA-mismatch gate. `cancel-in-progress: true` kills the older
# run the moment a newer commit lands — prevents the race entirely
# and keeps the signal on the verify step accurate.
concurrency:
  group: deploy-central-command
  cancel-in-progress: true

env:
  VPS_HOST: 178.156.162.116
  VPS_USER: root
  RELEASES_DIR: /opt/mcp-server/releases
  CURRENT_LINK: /opt/mcp-server/current

jobs:
  # ============================================================================
  # smoke-import — fast-fail canary.
  # ============================================================================
  # Independent job (NOT a step inside `test`) so it shows up as its own
  # required-status-check in branch protection. Runs in ~30s and dies
  # immediately on any ImportError / syntax error / missing dep. This is
  # the guardrail that would have caught the 2026-04-15 17:16Z typo that
  # kicked off an 11-deploy streak of silent failures.
  #
  # `test` + `privileged-chain-pg-tests` + `deploy` all `needs: smoke-import`
  # so a broken main can never consume ~5 minutes of the 400-test matrix
  # before surfacing.
  smoke-import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend deps
        working-directory: mcp-server/central-command/backend
        run: |
          pip install -r requirements.txt

      - name: Import sanity — backend loads clean
        working-directory: mcp-server
        run: |
          python -c "import main; print('mcp-server/main.py loads clean')"

  lifespan-smoke:
    # Session 210-B 2026-04-25 hardening #1: actually start uvicorn for ~60s
    # against a real Postgres + Redis, poll /health, verify /api/version
    # returns the GITHUB_SHA. Catches the class of bug that took prod down
    # today: `l2_auto_candidate_loop` deletion was lifespan-deferred (line
    # 1806 import), so `python -c 'import main'` (the smoke-import job
    # above) couldn't see it. Pre-push had the same gap. The bug only
    # surfaced when FastAPI invoked lifespan() — i.e. on every container
    # start in prod, where Docker dutifully restarted every 6 seconds.
    #
    # This job is the missing tier between "module imports" and "deploy
    # to prod" — it runs the real lifespan code path, with real DB I/O,
    # real migrations, and real /health serving. If the lifespan raises
    # ImportError, can't migrate, hangs on a slow startup hook, or fails
    # to bind /health, this job fails BEFORE the deploy stage starts.
    needs: smoke-import
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mcp
          POSTGRES_PASSWORD: mcp
          POSTGRES_DB: mcp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mcp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Keep all DB URLs aligned with the postgres service.
      DATABASE_URL: "postgresql+asyncpg://mcp:mcp@localhost:5432/mcp"
      MIGRATION_DATABASE_URL: "postgresql://mcp:mcp@localhost:5432/mcp"
      REDIS_URL: "redis://localhost:6379/0"
      # Disable third-party integrations that aren't needed for a
      # lifespan smoke (Stripe, MinIO, OpenAI). Lifespan handles
      # missing values gracefully but logs warnings; explicit empty
      # values keep the log signal clean.
      ENVIRONMENT: "development"
      L2_ENABLED: "false"
      MINIO_ACCESS_KEY: ""
      MINIO_SECRET_KEY: ""
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ""
      CSRF_SECRET: "ci-lifespan-smoke-secret-not-used-in-prod"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend deps
        working-directory: mcp-server/central-command/backend
        run: |
          pip install -r requirements.txt

      - name: Stage runtime layout (signing key, runbooks)
        run: |
          # Lifespan reads SIGNING_KEY_FILE + RUNBOOK_DIR from inside
          # the container at hard-coded paths. In CI we redirect them
          # to repo-relative tmp locations.
          mkdir -p ${{ github.workspace }}/.ci/secrets ${{ github.workspace }}/.ci/runbooks
          # Empty signing key — the lifespan generates one if missing.
          echo "SIGNING_KEY_FILE=${{ github.workspace }}/.ci/secrets/signing.key" >> $GITHUB_ENV
          echo "RUNBOOK_DIR=${{ github.workspace }}/.ci/runbooks" >> $GITHUB_ENV
          # Note: _read_release_sha_from_disk() reads /app/dashboard_api/RELEASE_SHA
          # which we can't write to in CI, so the runtime_sha falls back to
          # `git rev-parse HEAD` from the checkout — that gives us GITHUB_SHA.

      - name: Pre-run migrations (separate step for clearer diagnostics)
        working-directory: mcp-server/central-command/backend
        run: |
          set -e
          # main.py's lifespan calls migrate.cmd_up() internally, but
          # running it here gives us a clean failure signal if any
          # migration is broken — without conflating it with a slow
          # uvicorn startup.
          python -c "
          import asyncio, os, sys
          sys.path.insert(0, '.')
          from migrate import cmd_up
          asyncio.run(cmd_up())
          "

      - name: Boot mcp-server and wait for /health
        working-directory: mcp-server
        run: |
          set -e
          # Tee logs so we can show them on failure.
          mkdir -p ../.ci
          python -m uvicorn main:app --host 127.0.0.1 --port 8765 \
            > ../.ci/uvicorn.log 2>&1 &
          UVICORN_PID=$!
          echo "uvicorn started with PID=$UVICORN_PID"
          echo "UVICORN_PID=$UVICORN_PID" >> $GITHUB_ENV

          # Poll /health for up to 180s. With migrations pre-run above
          # this should be ~10-30s typical, but the 40 background tasks
          # the lifespan starts can race — give them headroom.
          HEALTHY=0
          for i in $(seq 1 36); do
            if curl -sf --max-time 3 http://127.0.0.1:8765/health 2>/dev/null \
                 | grep -q '"status":"ok"'; then
              echo "Healthy at attempt $i (~$((i*5))s)"
              HEALTHY=1
              break
            fi
            sleep 5
          done

          if [ "$HEALTHY" != "1" ]; then
            echo "::error::Lifespan smoke FAILED — /health never returned status=ok within 180s"
            echo "----- uvicorn log tail -----"
            tail -200 ../.ci/uvicorn.log || true
            kill $UVICORN_PID 2>/dev/null || true
            exit 1
          fi

      - name: Verify /api/version returns runtime_sha
        run: |
          set -e
          # /api/version is the contract surface deploy-verify uses.
          # In CI runtime_sha falls back to `git rev-parse HEAD` which
          # equals GITHUB_SHA on a checkout from the workflow event.
          VERSION=$(curl -sf --max-time 5 http://127.0.0.1:8765/api/version)
          echo "VERSION_RESPONSE=$VERSION"
          RUNTIME=$(echo "$VERSION" | python -c "import json,sys; print(json.load(sys.stdin).get('runtime_sha',''))")
          if [ -z "$RUNTIME" ] || [ "$RUNTIME" = "unknown" ]; then
            echo "::error::Lifespan smoke FAILED — /api/version returned empty/unknown runtime_sha"
            echo "Response: $VERSION"
            tail -200 .ci/uvicorn.log || true
            exit 1
          fi
          # GITHUB_SHA is the commit being tested. The lifespan-loaded
          # process should report it (or a 40-char prefix that matches).
          EXPECTED="${GITHUB_SHA:0:40}"
          if [ "$RUNTIME" != "$EXPECTED" ]; then
            echo "::warning::runtime_sha=$RUNTIME but GITHUB_SHA=$EXPECTED — accepting (CI checkout SHA may differ from event SHA on PR merges)"
          fi
          echo "Lifespan smoke PASSED — runtime_sha=$RUNTIME"

      - name: Stop uvicorn
        if: always()
        run: |
          if [ -n "${UVICORN_PID:-}" ]; then
            kill ${UVICORN_PID} 2>/dev/null || true
          fi
          # Always print the last 80 lines of the uvicorn log on the way out
          # so failures are diagnosable from the GitHub UI without an artifact.
          echo "----- uvicorn log tail -----"
          tail -80 .ci/uvicorn.log 2>/dev/null || echo "(no log)"

  test:
    needs: smoke-import
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend test dependencies
        working-directory: mcp-server/central-command/backend
        run: |
          pip install pytest==8.3.4 pytest-asyncio==0.24.0 httpx==0.27.0
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: mcp-server/central-command/backend
        run: |
          # Run each test file in its own subprocess to prevent stub contamination
          # (test files stub sys.modules which leaks across files in same process)
          failed=0
          for f in tests/test_*.py; do
            echo "::group::$f"
            python -m pytest "$f" -v --tb=short || failed=1
            echo "::endgroup::"
          done
          exit $failed

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp-server/central-command/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: mcp-server/central-command/frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: mcp-server/central-command/frontend
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: mcp-server/central-command/frontend
        run: npx eslint src/ --max-warnings 0

      - name: Vitest
        working-directory: mcp-server/central-command/frontend
        run: npx vitest run

  privileged-chain-pg-tests:
    needs: smoke-import
    # Phase 15 A-spec hygiene: end-to-end tests against real Postgres
    # for the Session 205 privileged-access security primitives:
    #   - chain enforcement triggers (migrations 175 + 176)
    #   - magic-link token mint/verify/consume cycle
    #   - separate MAGIC_LINK_HMAC_KEY_FILE defense-in-depth
    #
    # Why these exist: the Session 205 migration 175/176 %% RAISE bug
    # passed a syntax check (plpgsql function bodies are stored as
    # text), but failed at trigger-fire time with "too many parameters
    # specified for RAISE". A static migrations-up smoke test wouldn't
    # have caught it — only an INSERT/UPDATE test that fires the
    # trigger does. Magic-link tokens are similarly only safe if the
    # whole HMAC + expiry + single-use + session-binding chain is
    # actually exercised against a real DB.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mcp
          POSTGRES_PASSWORD: mcp
          POSTGRES_DB: mcp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mcp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend deps
        # Same pattern as the `test` job — backend conftest imports the
        # full package (models → pydantic → ...). Cheaper than
        # surgically pruning conftest just for these PG tests.
        working-directory: mcp-server/central-command/backend
        run: |
          pip install pytest==8.3.4 pytest-asyncio==0.24.0
          pip install -r requirements.txt

      - name: Privileged-chain trigger integration test
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_privileged_chain_triggers_pg.py -v --tb=short

      - name: Magic-link token integration test
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_privileged_magic_link_pg.py -v --tb=short

      - name: Chain-tamper detector integration test
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_chain_tamper_detector_pg.py -v --tb=short

      - name: Startup-invariants integration test
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_startup_invariants_pg.py -v --tb=short

      - name: Chain adversarial pen-test
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_privileged_chain_adversarial_pg.py -v --tb=short

      - name: Privileged-access attestation integration test
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_privileged_access_attestation_pg.py -v --tb=short

      - name: Fleet-intelligence scope isolation test
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_fleet_intelligence_scope_pg.py -v --tb=short

      - name: Retention verifier (proof-of-retention) integration test
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_retention_verifier_pg.py -v --tb=short

      - name: Sig-verify fingerprint divergence test
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_sig_verify_fingerprint_pg.py -v --tb=short

      - name: Fleet-intelligence API surface test
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_fleet_intelligence_api_pg.py -v --tb=short

      - name: Flywheel promotion rollout end-to-end test
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_promotion_rollout_pg.py -v --tb=short

      - name: Appliance offline-detection state machine
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_appliance_offline_detection_pg.py -v --tb=short

      - name: Cross-language YAML validator (Go daemon compat)
        # Mirrors processor.go::validatePromotedRule in Python so we
        # catch synthesizer regressions BEFORE deploy. Today's session
        # hit two daemon-compat bugs sequentially because no Python
        # test was checking against the Go validator. Lockstep test at
        # the bottom of the file catches whitelist drift.
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_yaml_daemon_compat.py -v --tb=short

      - name: Partner dashboard cross-partner isolation (PG)
        # Session 206 partner round-table P0: single most trust-ending
        # bug class is leaking one partner's sites into another's dashboard.
        # Pins the isolation contract at the SQL layer.
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_partner_dashboard_isolation.py -v --tb=short

      - name: Flywheel hero metric math (PG)
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_flywheel_hero_metric_pg.py -v --tb=short

      - name: Flywheel Spine — state machine + orchestrator (PG)
        # Session 206 redesign: the spine. This test is the contract —
        # if it passes, the flywheel's state machine is intact end-to-end.
        # If it fails, the thing that broke is exactly named. Replaces
        # the audit-driven discovery of silent auto-disable failures.
        env:
          PG_TEST_URL: postgresql://mcp:mcp@localhost:5432/mcp
        working-directory: mcp-server/central-command/backend
        run: |
          python3 -m pytest tests/test_flywheel_spine_pg.py -v --tb=short

  deploy:
    needs: [test, privileged-chain-pg-tests, lifespan-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp-server/central-command/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: mcp-server/central-command/frontend
        run: npm ci

      - name: Build frontend
        working-directory: mcp-server/central-command/frontend
        run: npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create release directory
        run: |
          RELEASE_ID=$(date -u +%Y%m%d_%H%M%S)_${GITHUB_SHA::8}
          echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_ENV
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "mkdir -p ${{ env.RELEASES_DIR }}/$RELEASE_ID/{dashboard_api,app,frontend_dist,frontend}"

      - name: Deploy backend to release
        run: |
          rsync -avz --delete \
            mcp-server/central-command/backend/ \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/dashboard_api/

      - name: Deploy main.py to release
        run: |
          rsync -avz \
            mcp-server/main.py \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/app/

      - name: Deploy frontend to release
        run: |
          rsync -avz --delete \
            mcp-server/central-command/frontend/dist/ \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/frontend_dist/

      - name: Deploy nginx config to release
        run: |
          rsync -avz \
            mcp-server/central-command/frontend/nginx.conf \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/frontend/nginx.conf

      - name: Deploy docker-compose.yml to release
        # Source-control the VPS compose file. Without this step, env changes
        # (e.g., MIGRATION_DATABASE_URL added Session 205) are tribal knowledge
        # and reappear as silent failures if the VPS is rebuilt or the file is
        # edited by hand. The compose file holds no hardcoded secrets — all
        # passwords are ${ENV:-default} references resolved from /opt/mcp-server/.env.
        run: |
          rsync -avz \
            mcp-server/docker-compose.yml \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/docker-compose.yml

      - name: Stamp RELEASE_SHA marker
        # P0-fix (Session 206 round-table): write the commit SHA into a
        # file the running app can read at /api/version. Post-deploy
        # verify asserts the SHA the process reports matches GITHUB_SHA.
        # Writing INSIDE the dashboard_api/ subdir so the atomic rsync
        # (--delete) naturally carries it to dashboard_api_mount/ —
        # which is bind-mounted into the container as /app/dashboard_api.
        env:
          SHA: ${{ github.sha }}
          RDIR: ${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            "printf '%s' '$SHA' > '$RDIR/RELEASE_SHA' && \
             printf '%s' '$SHA' > '$RDIR/dashboard_api/RELEASE_SHA'"
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            "echo 'RELEASE_SHA root:'; cat '$RDIR/RELEASE_SHA'; echo; \
             echo 'RELEASE_SHA dashboard_api:'; cat '$RDIR/dashboard_api/RELEASE_SHA'; echo"

      - name: Atomic switch — symlink to new release
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} << EOF
            # Save previous release for rollback reference
            PREV_RELEASE=\$(readlink -f ${{ env.CURRENT_LINK }} 2>/dev/null || echo "none")
            echo "Previous release: \$PREV_RELEASE"
            echo "New release: ${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}"

            # Copy release files to the live mount points (Docker volume mounts)
            rsync -a --delete ${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/dashboard_api/ /opt/mcp-server/dashboard_api_mount/
            rsync -a ${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/app/ /opt/mcp-server/app/
            rsync -a --delete ${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/frontend_dist/ /opt/mcp-server/frontend_dist/
            rsync -a ${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/frontend/nginx.conf /opt/mcp-server/frontend/nginx.conf

            # Caddy serves /sitemap.xml and /robots.txt from /opt/mcp-server/static/,
            # NOT from frontend_dist/. If we only rsync frontend_dist these files
            # silently go stale (recurring Session 206 + Session 207 failure).
            # Keep both paths in lockstep so public/ assets always reach the
            # Caddy-served location in one atomic release step.
            mkdir -p /opt/mcp-server/static
            for f in sitemap.xml robots.txt; do
              if [ -f "${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/frontend_dist/\$f" ]; then
                rsync -a "${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/frontend_dist/\$f" "/opt/mcp-server/static/\$f"
                echo "Synced public asset: \$f"
              fi
            done
            # RELEASE_SHA travels INSIDE the dashboard_api/ rsync
            # source tree (see Stamp step), so the atomic rsync above
            # already placed it at
            # /opt/mcp-server/dashboard_api_mount/RELEASE_SHA.
            # That path is bind-mounted as /app/dashboard_api/RELEASE_SHA
            # inside the container, which is what /api/version reads.

            # Sync docker-compose.yml — tracked in git so env changes
            # (like MIGRATION_DATABASE_URL) aren't tribal knowledge.
            # Diff first so we log any change before applying.
            if ! diff -q ${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/docker-compose.yml /opt/mcp-server/docker-compose.yml > /dev/null 2>&1; then
              echo "docker-compose.yml changed — diffing before sync:"
              diff /opt/mcp-server/docker-compose.yml ${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/docker-compose.yml || true
              cp /opt/mcp-server/docker-compose.yml /opt/mcp-server/docker-compose.yml.bak.\$(date +%s)
              rsync -a ${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }}/docker-compose.yml /opt/mcp-server/docker-compose.yml
              echo "docker-compose.yml updated; will trigger \`docker compose up -d\` below"
              export COMPOSE_CHANGED=1
            fi

            # Update symlink to new release (for rollback reference)
            ln -sfn ${{ env.RELEASES_DIR }}/${{ env.RELEASE_ID }} ${{ env.CURRENT_LINK }}

            # Fix permissions
            chmod -R 755 /opt/mcp-server/dashboard_api_mount/
            chmod 644 /opt/mcp-server/app/main.py
          EOF

      - name: Pre-flight — container must be healthy before we touch it
        # Session 210 (2026-04-24): the deploy workflow tried to run
        # `docker exec mcp-server migrate.py` against a container that
        # was crashlooping from a prior bad release (FastAPI 204 + return
        # annotation crashed import). Each `docker exec` failed with
        # "Container is restarting", the workflow errored, the rollback
        # restored the SAME bad release, and the next deploy repeated
        # the loop. Manual SSH intervention was the only escape.
        #
        # Fix: check the container state BEFORE touching it. Two cases:
        #   * Container healthy or running → proceed
        #   * Container restarting/exited → abort deploy, page human
        run: |
          ssh "${VPS_USER}@${VPS_HOST}" bash -s <<'EOF'
            set -e
            STATE=$(docker inspect -f '{{.State.Status}}' mcp-server 2>/dev/null || echo "missing")
            HEALTH=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' mcp-server 2>/dev/null || echo "missing")
            RESTARTS=$(docker inspect -f '{{.RestartCount}}' mcp-server 2>/dev/null || echo "0")
            echo "container state=$STATE health=$HEALTH restarts=$RESTARTS"
            if [ "$STATE" = "restarting" ] || [ "$STATE" = "exited" ] || [ "$STATE" = "dead" ]; then
              echo "FATAL: mcp-server is not in a healthy state ($STATE)."
              echo "Likely a prior deploy left bad code bind-mounted and the container"
              echo "is crashlooping. Running migrations / rsync now would make it worse."
              echo ""
              echo "Manual recovery (operator): SSH to VPS, rsync the newest good"
              echo "release from /opt/mcp-server/releases/<sha>/dashboard_api/ into"
              echo "/opt/mcp-server/dashboard_api_mount/, then \`docker compose"
              echo "restart mcp-server\`. Once /health returns 200, re-run this"
              echo "workflow via workflow_dispatch."
              exit 1
            fi
          EOF
        env:
          VPS_USER: ${{ env.VPS_USER }}
          VPS_HOST: ${{ env.VPS_HOST }}

      - name: Run database migrations
        # Fail-closed: silent migration drift caused the 2026-04-12 90-min
        # fleet-order outage. If migrations fail, this step exits non-zero
        # so the Rollback on failure job triggers. The startup hook in
        # main.py also applies migrations fail-closed on every boot —
        # this CI step is belt-and-suspenders.
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash -s <<'EOF'
            set -e
            docker exec mcp-server python3 /app/dashboard_api/migrate.py status
            docker exec mcp-server python3 /app/dashboard_api/migrate.py up
            # Parse the summary line "N applied, N pending" — avoid grepping
            # for the word "pending" alone (matches migration NAMES like
            # pending_alerts and the "0 pending" summary).
            PENDING_OUT=$(docker exec mcp-server python3 /app/dashboard_api/migrate.py status)
            PENDING_COUNT=$(echo "$PENDING_OUT" | grep -oE '[0-9]+ pending$' | awk '{print $1}' | head -1)
            if [ -z "$PENDING_COUNT" ]; then
              echo "Could not parse pending count from migrate.py status output"
              echo "$PENDING_OUT"
              exit 1
            fi
            if [ "$PENDING_COUNT" -ne 0 ]; then
              echo "FATAL: $PENDING_COUNT migration(s) still pending after apply"
              echo "$PENDING_OUT"
              exit 1
            fi
          EOF

      - name: Restart services
        # Python code is BIND-MOUNTED from /opt/mcp-server/dashboard_api_mount/
        # — `docker compose up -d` alone is a no-op when compose config hasn't
        # changed, which meant new code sat on disk but the old process kept
        # running. `restart` forces a fresh Python interpreter so new modules
        # are loaded. `up -d` still runs first so any compose/env changes from
        # the rsynced docker-compose.yml (e.g. new env vars) do take effect.
        #
        # Discovered Session 206: mcp-server container had been up for 6h
        # despite 3+ green deploys; none of the new bg_tasks were actually
        # running. Add `restart` so every green deploy is actually live.
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} << 'EOF'
            cd /opt/mcp-server
            # Session 206: pgbouncer transaction-pool shares server connections
            # across mcp-server processes. asyncpg's deterministic prepared
            # statement names collide on mcp-server restart. Terminate
            # stale postgres sessions + restart pgbouncer BEFORE mcp-server
            # starts fresh — guarantees a clean prepared-stmt namespace.
            docker exec mcp-postgres psql -U mcp -d mcp -c \
              "SELECT pg_terminate_backend(pid) FROM pg_stat_activity \
               WHERE datname='mcp' AND usename IN ('mcp','mcp_app') \
                 AND pid <> pg_backend_pid();" >/dev/null 2>&1 || true
            docker compose restart pgbouncer
            sleep 5
            docker compose up -d pgbouncer
            sleep 3
            docker compose up -d mcp-server frontend
            sleep 2
            docker compose restart mcp-server frontend
          EOF

      - name: Verify deployment
        # Two-tier verification:
        #   1. /health returns 200 — process is up and routing.
        #   2. /api/version asserts the running process's SHA matches
        #      this workflow's GITHUB_SHA. This catches the silent-no-op
        #      deploy bug we hit on 2026-04-13.
        #
        # Session 210 (2026-04-24): poll /health for up to 120s instead
        # of a one-shot sleep 15. Root cause: main.py's middleware +
        # DB pool + asyncpg prepare-statement warm-up can exceed 15s
        # under load. 4 deploys on 2026-04-24 (632d3408, 13ccb3eb,
        # 676a2ece, 1938c579) false-failed on verify while the
        # container was actually coming up healthy 10-20s later.
        run: |
          echo "Polling /health for up to 120s (backend warm-up can exceed 15s)..."
          HEALTH=""
          for i in $(seq 1 24); do
            HEALTH=$(ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "curl -sf --max-time 3 http://localhost:8000/health" 2>/dev/null || true)
            if echo "$HEALTH" | grep -q '"status":"ok"'; then
              echo "Healthy at attempt $i (~$((i*5))s)"
              break
            fi
            sleep 5
          done
          if ! echo "$HEALTH" | grep -q '"status":"ok"'; then
            echo "FATAL: /health did not return status=ok within 120s"
            echo "Last response: $HEALTH"
            exit 1
          fi
          HEALTH=$(ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "curl -sf http://localhost:8000/health")
          echo "Health: $HEALTH"
          echo "$HEALTH" | grep -q '"status":"ok"' || exit 1

          VERSION=$(ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "curl -sf http://localhost:8000/api/version")
          echo "Version: $VERSION"
          RUNTIME_SHA=$(echo "$VERSION" | python3 -c "import json,sys; print(json.load(sys.stdin).get('runtime_sha',''))")
          DISK_SHA=$(echo "$VERSION" | python3 -c "import json,sys; print(json.load(sys.stdin).get('disk_sha',''))")
          EXPECTED="${{ github.sha }}"

          echo "expected=$EXPECTED"
          echo "runtime= $RUNTIME_SHA"
          echo "disk=    $DISK_SHA"

          if [ "$DISK_SHA" != "$EXPECTED" ]; then
            echo "FATAL: disk SHA != GITHUB_SHA — rsync did not write RELEASE_SHA"
            exit 1
          fi
          if [ "$RUNTIME_SHA" != "$EXPECTED" ]; then
            echo "FATAL: runtime SHA != GITHUB_SHA — container did NOT pick up new code."
            echo "This is the silent-no-op bug. The 'docker compose restart' step"
            echo "above must have failed. Check service logs."
            exit 1
          fi
          echo "Deploy verified: process running ${EXPECTED:0:7}"

          # SEO smoke test: sitemap.xml and robots.txt are served by Caddy
          # from /opt/mcp-server/static/, NOT from frontend_dist. Without
          # this check we repeat the Session 206 + Session 207 + bfcefe6
          # regression where new public/ assets silently go stale at the
          # serving layer while the atomic release places them correctly
          # in frontend_dist.
          echo "---- SEO smoke test ----"
          SITEMAP=$(ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "curl -sf http://localhost/sitemap.xml" || true)
          ROBOTS=$(ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "curl -sf http://localhost/robots.txt" || true)

          if [ -z "$SITEMAP" ]; then
            echo "WARN: /sitemap.xml did not respond — skipping content check"
          else
            SITEMAP_FD=$(ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "cat /opt/mcp-server/frontend_dist/sitemap.xml 2>/dev/null | wc -c")
            SITEMAP_STATIC=$(ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "cat /opt/mcp-server/static/sitemap.xml 2>/dev/null | wc -c")
            if [ "$SITEMAP_FD" != "$SITEMAP_STATIC" ]; then
              echo "FATAL: /opt/mcp-server/frontend_dist/sitemap.xml ($SITEMAP_FD bytes) differs from"
              echo "       /opt/mcp-server/static/sitemap.xml ($SITEMAP_STATIC bytes)."
              echo "       Caddy-served sitemap will go stale. Check the rsync step above."
              exit 1
            fi
            echo "Sitemap check: frontend_dist and static are in lockstep ($SITEMAP_FD bytes)"
          fi

          if [ -n "$ROBOTS" ]; then
            ROBOTS_FD=$(ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "cat /opt/mcp-server/frontend_dist/robots.txt 2>/dev/null | wc -c")
            ROBOTS_STATIC=$(ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "cat /opt/mcp-server/static/robots.txt 2>/dev/null | wc -c")
            if [ "$ROBOTS_FD" != "$ROBOTS_STATIC" ]; then
              echo "FATAL: robots.txt drift between frontend_dist and static. See sitemap note."
              exit 1
            fi
            echo "robots.txt check: frontend_dist and static are in lockstep ($ROBOTS_FD bytes)"
          fi

      - name: Retention — prune old releases + compose backups
        # Session 206 deploy-cleanup: without retention, releases/
        # grows unbounded (each ~10MB) and docker-compose.yml.bak.*
        # accumulates one per deploy. Keep the last 10 releases (for
        # rollback) and last 3 compose backups. Never touches the
        # release `current` symlink points at.
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash -s <<'EOF'
            set -e
            CURRENT=$(readlink -f /opt/mcp-server/current 2>/dev/null || echo "")
            cd /opt/mcp-server/releases
            # Keep newest 10, prune older (skip `current` target for safety).
            ls -1dt */ 2>/dev/null | tail -n +11 | while read d; do
              full="/opt/mcp-server/releases/${d%/}"
              if [ "$full" = "$CURRENT" ]; then
                echo "SKIP (current): $full"; continue
              fi
              echo "prune release: $full"
              rm -rf "$full"
            done
            # Keep newest 3 compose backups, prune older.
            cd /opt/mcp-server
            ls -1t docker-compose.yml.bak.* 2>/dev/null | tail -n +4 | while read f; do
              echo "prune compose bak: $f"
              rm -f "/opt/mcp-server/$f"
            done
            echo "Retention complete."
          EOF

      - name: Rollback on failure
        if: failure()
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} << 'EOF'
            echo "DEPLOY FAILED — attempting rollback..."
            CURRENT=$(readlink -f /opt/mcp-server/current 2>/dev/null)
            # Find the previous release (second newest)
            PREV=$(ls -dt /opt/mcp-server/releases/*/ 2>/dev/null | sed -n '2p' | sed 's:/$::')
            if [ -n "$PREV" ] && [ -d "$PREV" ]; then
              echo "Rolling back to: $PREV"
              rsync -a --delete "$PREV/dashboard_api/" /opt/mcp-server/dashboard_api_mount/
              rsync -a "$PREV/app/" /opt/mcp-server/app/
              rsync -a --delete "$PREV/frontend_dist/" /opt/mcp-server/frontend_dist/
              rsync -a "$PREV/frontend/nginx.conf" /opt/mcp-server/frontend/nginx.conf
              # Rollback also restores sitemap.xml + robots.txt from the previous release's
              # frontend_dist so the Caddy-served static assets match the rolled-back code.
              for f in sitemap.xml robots.txt; do
                if [ -f "$PREV/frontend_dist/$f" ]; then
                  rsync -a "$PREV/frontend_dist/$f" "/opt/mcp-server/static/$f"
                fi
              done
              ln -sfn "$PREV" /opt/mcp-server/current
              chmod -R 755 /opt/mcp-server/dashboard_api_mount/
              cd /opt/mcp-server && docker compose restart pgbouncer && sleep 3 && docker compose restart mcp-server frontend
              sleep 10
              curl -sf http://localhost:8000/health && echo "ROLLBACK SUCCESSFUL" || echo "ROLLBACK FAILED — manual intervention required"
            else
              echo "NO PREVIOUS RELEASE FOUND — manual intervention required"
            fi
          EOF

      # Cleanup step superseded by the `Retention — prune old releases + compose backups`
      # step above (keeps last 10 releases, skips the `current` symlink target, also
      # prunes compose backups). Keeping last 5 was too aggressive for rollback.
